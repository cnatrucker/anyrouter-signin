name: AnyRouter 自动签到
on:
  schedule:
    - cron: '0 1,7,13,19 * * *'
  workflow_dispatch:

jobs:
  checkin:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: 缓存 pip 依赖
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
        restore-keys: ${{ runner.os }}-pip-

    - name: 获取 Playwright 版本
      id: pw-version
      run: |
        pip install -r requirements.txt
        echo "version=$(python -c 'import importlib.metadata; print(importlib.metadata.version(\"playwright\"))')" >> $GITHUB_OUTPUT

    - name: 缓存 Playwright 浏览器
      uses: actions/cache@v4
      id: pw-cache
      with:
        path: ~/.cache/ms-playwright
        key: ${{ runner.os }}-playwright-${{ steps.pw-version.outputs.version }}

    - name: 安装 Playwright 浏览器
      if: steps.pw-cache.outputs.cache-hit != 'true'
      run: playwright install chromium --with-deps

    - name: 安装 Playwright 系统依赖
      if: steps.pw-cache.outputs.cache-hit == 'true'
      run: playwright install-deps chromium

    - name: 执行签到
      env:
        ACCOUNTS: ${{ secrets.ACCOUNTS }}
        SCREENSHOTS: 'true'
      run: python checkin.py

    - name: 上传截图（调试用）
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: screenshots
        path: screenshots/
        if-no-files-found: ignore
        retention-days: 3

