name: Keepalive - 防止仓库被判定不活跃
on:
  schedule:
    - cron: '23 3 * * 1'  # 每周一 UTC 3:23（北京时间 11:23）
  workflow_dispatch:

jobs:
  keepalive:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: 更新 keepalive 时间戳
        run: |
          printf '%s\n' "$(date -u +'%Y-%m-%dT%H:%M:%SZ')" > .github/keepalive

      - name: 提交 keepalive 更新
        run: |
          if git diff --quiet -- .github/keepalive; then
            echo "No changes to commit"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .github/keepalive
          git commit -m "chore: keep repository active"
          git push
